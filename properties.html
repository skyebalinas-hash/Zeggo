<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Property Details</title>

<link rel="stylesheet" href="style.css">

<style>

.property-page{
    padding:80px 8%;
}

.property-container{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 35px rgba(0,0,0,.12);
}

.property-container img{
    width:100%;
    height:500px;
    object-fit:cover;
}

.property-details{
    padding:40px;
}

.property-details h1{
    font-size:42px;
    margin-bottom:15px;
}

.price{
    font-size:32px;
    color:#006AFF;
    font-weight:bold;
    margin-bottom:20px;
}

.info{
    display:flex;
    gap:30px;
    margin:25px 0;
    color:#555;
}

.back{
    display:inline-block;
    margin-bottom:30px;
    color:#006AFF;
    text-decoration:none;
    font-weight:bold;
}

.contact{
    background:#006AFF;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
}

</style>

</head>


<body>


<div class="property-page">

<a class="back" href="index.html">
← Back to Home
</a>


<div class="property-container">


<img src="https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=900">


<div class="property-details">

<h1>Modern Family Home</h1>

<div class="price">
₱5,500,000
</div>


<p>
A beautiful modern family house located in Cebu.
Perfect for families looking for comfort and space.
</p>


<div class="info">

<span>🛏 3 Bedrooms</span>

<span>🚿 2 Bathrooms</span>

<span>🚗 2 Garage</span>

</div>


<button class="contact">
Contact Agent
</button>


</div>


</div>

</div>


</body>

</html>
