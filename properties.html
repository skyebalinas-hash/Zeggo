<!-- ================= PAGE HEADER ================= -->

<section class="page-hero">

<h1>

Browse Properties

</h1>

<p>

Find your perfect home anywhere in the Philippines.

</p>

</section>

<!-- ================= SEARCH BAR ================= -->

<section class="property-search">

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search by city, province or property name">

<select id="status">

<option value="">Status</option>

<option value="For Sale">For Sale</option>

<option value="For Rent">For Rent</option>

</select>

<select id="price">

<option value="">Any Price</option>

<option value="1000000">₱1M+</option>

<option value="3000000">₱3M+</option>

<option value="5000000">₱5M+</option>

<option value="10000000">₱10M+</option>

</select>

<select id="beds">

<option value="">Bedrooms</option>

<option value="1">1+</option>

<option value="2">2+</option>

<option value="3">3+</option>

<option value="4">4+</option>

<option value="5">5+</option>

</select>

<select id="type">

<option value="">Property Type</option>

<option value="House">House & Lot</option>

<option value="Condo">Condominium</option>

<option value="Apartment">Apartment</option>

<option value="Lot">Lot Only</option>

</select>

<button id="searchProperties">

Search

</button>

</div>

</section>

    <!-- ================= RESULTS ================= -->

<section class="properties-section">

    <div class="properties-header">

        <h2 id="propertyCount">
            Available Properties
        </h2>

        <select id="sortProperties">

            <option value="default">Sort By</option>

            <option value="priceLow">
                Price: Low to High
            </option>

            <option value="priceHigh">
                Price: High to Low
            </option>

            <option value="beds">
                Most Bedrooms
            </option>

            <option value="newest">
                Newest Listings
            </option>

        </select>

    </div>

    <div
        id="propertyGrid"
        class="property-grid">

        <!-- Properties loaded by JavaScript -->

    </div>

</section>
